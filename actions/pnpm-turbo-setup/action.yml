name: "pnpm + Turborepo Setup"
description: "Checkout, setup pnpm, Node.js, restore Turborepo cache, and install dependencies"

inputs:
  node-version-file:
    description: "Path to the Node.js version file (.node-version, .nvmrc, etc.). Auto-detects .node-version then .nvmrc if not specified."
    required: false
    default: ""
  fetch-depth:
    description: "Number of commits to fetch. 0 fetches all history."
    required: false
    default: "1"

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: ${{ inputs.fetch-depth }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v5

    - name: Detect Node.js version file
      id: detect-node-version-file
      shell: bash
      run: |
        if [ -n "${{ inputs.node-version-file }}" ]; then
          echo "node-version-file=${{ inputs.node-version-file }}" >> $GITHUB_OUTPUT
        elif [ -f ".node-version" ]; then
          echo "node-version-file=.node-version" >> $GITHUB_OUTPUT
        elif [ -f ".nvmrc" ]; then
          echo "node-version-file=.nvmrc" >> $GITHUB_OUTPUT
        else
          echo "node-version-file=.node-version" >> $GITHUB_OUTPUT
        fi

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: ${{ steps.detect-node-version-file.outputs.node-version-file }}
        cache: pnpm

    - name: Restore Turborepo cache
      uses: actions/cache@v5
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
