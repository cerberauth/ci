name: "Node.js Build and Test"
description: "Setup Node.js, install dependencies, check format, lint, and run tests"

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .node-version
        cache: npm

    - name: Install Dependencies
      shell: bash
      run: npm ci

    - name: Check Format
      shell: bash
      run: npm run format:check

    - name: Lint
      shell: bash
      run: npm run lint

    - name: Test
      shell: bash
      run: npm run ci-test
