name: Releaser
description: Publish a project via GoReleaser with Docker, Snapcraft, Homebrew, Scoop, AUR, Winget, nfpm, and Chocolatey

inputs:
  setup-go:
    description: "Set up Go environment before releasing"
    required: false
    default: "true"
  go-version:
    description: "Go version to use (only used when setup-go is true)"
    required: false
    default: "1.26"
  package-name:
    description: "Package name for Snapcraft status check (skip Snapcraft if empty)"
    required: false
    default: ""
  dockerhub-username:
    description: "Docker Hub username"
    required: true
  dockerhub-token:
    description: "Docker Hub token"
    required: true
  snapcraft-store-credentials:
    description: "Snapcraft store credentials (required when package-name is set)"
    required: false
    default: ""
  chocolatey-api-key:
    description: "Chocolatey API key (optional, skip if project does not publish to Chocolatey)"
    required: false
    default: ""
  aur-key:
    description: "AUR SSH private key (optional, skip if project does not publish to AUR)"
    required: false
    default: ""
  github-token:
    description: "GitHub PAT for GoReleaser (Homebrew tap, Scoop bucket, Winget PRs)"
    required: true
  skip:
    description: "Comma-separated GoReleaser publishers to skip (aur,brew,chocolatey,docker,scoop,snapcraft,winget)"
    required: false
    default: ""
  only:
    description: "Publish only to this publisher — skips all others (aur,brew,chocolatey,docker,scoop,snapcraft,winget). Overrides skip."
    required: false
    default: ""
  goreleaser-current-tag:
    description: "Override the current tag used by GoReleaser (GORELEASER_CURRENT_TAG)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup Go environment
      if: ${{ inputs.setup-go == 'true' }}
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-token }}

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Install Cosign
      uses: sigstore/cosign-installer@v4.1.1

    - name: Install Syft
      uses: anchore/sbom-action/download-syft@v0

    # https://github.com/goreleaser/goreleaser/issues/1715#issuecomment-667002748
    # https://github.com/goreleaser/goreleaser/issues/4816
    - name: Install Snapcraft
      if: ${{ inputs.package-name != '' }}
      shell: bash
      run: |
        sudo apt-get --quiet update
        sudo apt-get --no-install-suggests --no-install-recommends --quiet --yes install musl-tools snapd
        sudo snap install snapcraft --classic
        snapcraft status ${{ inputs.package-name }}
        mkdir -p $HOME/.cache/snapcraft/download
        mkdir -p $HOME/.cache/snapcraft/stage-packages
      env:
        SNAPCRAFT_STORE_CREDENTIALS: ${{ inputs.snapcraft-store-credentials }}

    - name: Install Chocolatey
      if: ${{ inputs.chocolatey-api-key != '' }}
      shell: bash
      run: |
        sudo apt-get --quiet update
        sudo apt-get --no-install-suggests --no-install-recommends --quiet --yes install dirmngr ca-certificates gnupg
        sudo gpg --homedir /tmp --no-default-keyring --keyring /usr/share/keyrings/mono-official-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys 3FA7E0328081BFF6A14DA29AA6A19B38D3D831EF
        echo "deb [signed-by=/usr/share/keyrings/mono-official-archive-keyring.gpg] https://download.mono-project.com/repo/debian stable-buster main" | sudo tee /etc/apt/sources.list.d/mono-official-stable.list
        sudo apt-get --quiet update
        sudo apt-get --no-install-suggests --no-install-recommends --quiet --yes install mono-devel
        mkdir -p /opt/chocolatey
        wget -q -O - "https://github.com/chocolatey/choco/releases/download/${CHOCOLATEY_VERSION}/chocolatey.v${CHOCOLATEY_VERSION}.tar.gz" | tar -xz -C "/opt/chocolatey"
        echo '#!/bin/bash' >> /usr/local/bin/choco
        echo 'mono /opt/chocolatey/choco.exe $@' >> /usr/local/bin/choco
        chmod +x /usr/local/bin/choco
        choco upgrade chocolatey
        choco info ${{ inputs.package-name }}
      env:
        CHOCOLATEY_VERSION: 2.6.0

    - name: Compute GoReleaser args
      id: goreleaser-args
      shell: bash
      run: |
        ALL_PUBLISHERS="aur brew chocolatey docker ko krew nfpm nix scoop snapcraft winget"
        SKIP="${{ inputs.skip }}"
        ONLY="${{ inputs.only }}"

        if [ -n "$ONLY" ]; then
          ONLY_LIST=$(echo "$ONLY" | tr ',' ' ')
          SKIP_LIST=""
          for pub in $ALL_PUBLISHERS; do
            found=0
            for only_pub in $ONLY_LIST; do
              [ "$pub" = "$only_pub" ] && found=1 && break
            done
            [ $found -eq 0 ] && SKIP_LIST="${SKIP_LIST:+$SKIP_LIST,}$pub"
          done
          SKIP="$SKIP_LIST"
        fi

        ARGS="release --clean"
        [ -n "$SKIP" ] && ARGS="$ARGS --skip=$SKIP"
        echo "args=$ARGS" >> "$GITHUB_OUTPUT"

    - uses: goreleaser/goreleaser-action@v7
      with:
        distribution: goreleaser
        version: latest
        args: ${{ steps.goreleaser-args.outputs.args }}
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        SNAPCRAFT_STORE_CREDENTIALS: ${{ inputs.snapcraft-store-credentials }}
        CHOCOLATEY_API_KEY: ${{ inputs.chocolatey-api-key }}
        AUR_KEY: ${{ inputs.aur-key }}
        GORELEASER_CURRENT_TAG: ${{ inputs.goreleaser-current-tag }}
