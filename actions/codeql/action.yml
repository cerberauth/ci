name: "CodeQL Analysis"
description: "Initialize and run CodeQL analysis for a given language"

inputs:
  language:
    description: "The language to analyze"
    required: true
  build-mode:
    description: "The build mode to use"
    required: true
  config-file:
    description: "Path to the CodeQL config file (optional)"
    required: false
    default: ""
  source-root:
    description: "Source root directory for CodeQL analysis (optional)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ inputs.language }}
        build-mode: ${{ inputs.build-mode }}
        config-file: ${{ inputs.config-file }}
        source-root: ${{ inputs.source-root }}

    - name: Run manual build steps
      if: inputs.build-mode == 'manual'
      shell: bash
      run: |
        echo 'If you are using a "manual" build mode for one or more of the' \
          'languages you are analyzing, replace this with the commands to build' \
          'your code, for example:'
        echo '  make bootstrap'
        echo '  make release'
        exit 1

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{ inputs.language }}"
