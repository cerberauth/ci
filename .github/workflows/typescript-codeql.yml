name: "TypeScript CodeQL"

on:
  workflow_call:
    inputs:
      config-file:
        description: "Path to the CodeQL config file"
        required: false
        type: string
        default: ".github/codeql/codeql-config.yml"
      source-root:
        description: "Source root directory for CodeQL analysis"
        required: false
        type: string
        default: "src"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: typescript
            build-mode: none

    steps:
      - name: CodeQL Analysis
        uses: cerberauth/ci/actions/codeql@main
        with:
          language: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ${{ inputs.config-file }}
          source-root: ${{ inputs.source-root }}
