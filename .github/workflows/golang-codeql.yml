name: "Golang CodeQL"

on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version to use for CodeQL analysis"
        type: string
        default: "1.26"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: go
            build-mode: autobuild

    steps:
      - name: Setup Go environment
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}

      - name: CodeQL Analysis
        uses: cerberauth/ci/actions/codeql@main
        with:
          language: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
