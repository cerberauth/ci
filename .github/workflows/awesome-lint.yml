name: Awesome Lint (Reusable)

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version to use
        type: string
        default: "lts/*"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v6

      - name: Setup node env 🏗
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}

      - name: Run linter 👀
        run: npx awesome-lint
